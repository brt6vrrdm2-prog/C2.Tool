<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C2 Analyse Tool</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 450px; width: 100%; }
        h2 { color: #1a73e8; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        button:hover { background-color: #1557b0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
        th { background-color: #f8f9fa; }
        .no-result { color: #d93025; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ C2 Analyse</h2>
    <p style="font-size: 0.8em; color: #666;">Fixwerte: CL = 300pF | RM = 2MΩ</p>

    <label>C1 (F):</label>
    <input type="number" id="input_c1" step="any" value="0.000001">

    <label>Nennspannung Un (V):</label>
    <input type="number" id="input_un" value="230">

    <button onclick="berechne()">Analyse starten</button>

    <div id="ausgabe"></div>
</div>

<script>
    function berechne() {
        // 1. Werte aus den Feldern holen
        const c1 = parseFloat(document.getElementById('input_c1').value);
        const un = parseFloat(document.getElementById('input_un').value);
        const ausgabeDiv = document.getElementById('ausgabe');

        // 2. Konstanten (wie in deinem C-Code)
        const E12 = [1.0, 1.2, 1.5, 1.8, 2.2, 2.7, 3.3, 3.9, 4.7, 5.6, 6.8, 8.2];
        const CL = 300e-12;
        const RM = 2e6;
        const LIMIT_HOCH = 2.5e-6;
        const LIMIT_NIEDRIG = 1.67e-6;

        let gefunden = false;
        let tabelleHTML = "<table><tr><th>C2 (F)</th><th>I (45%)</th><th>I (10%)</th></tr>";

        // 3. Die Schleifen (identisch zum C-Code)
        for (let d = -12; d <= -3; d++) {
            let potenz = Math.pow(10, d);
            for (let i = 0; i < E12.length; i++) {
                let c2 = E12[i] * potenz;
                
                // Formel: I = (Faktor * Un * (C1 / (C1 + C2 + CL))) / RM
                let vTeiler = c1 / (c1 + c2 + CL);
                let iHoch = (0.45 * un * vTeiler) / RM;
                let iNiedrig = (0.10 * un * vTeiler) / RM;

                // 4. Prüfung der Bedingungen
                if (iHoch > LIMIT_HOCH && iNiedrig <= LIMIT_NIEDRIG) {
                    tabelleHTML += `<tr>
                        <td>${c2.toExponential(1)}</td>
                        <td>${iHoch.toExponential(2)} A</td>
                        <td>${iNiedrig.toExponential(2)} A</td>
                    </tr>`;
                    gefunden = true;
                }
            }
        }

        // 5. Ergebnis anzeigen
        if (gefunden) {
            ausgabeDiv.innerHTML = tabelleHTML + "</table>";
        } else {
            ausgabeDiv.innerHTML = "<div class='no-result'>Keine passenden Werte gefunden.</div>";
        }
    }
</script>

</body>
</html>
