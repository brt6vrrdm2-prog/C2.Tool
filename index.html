<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>TML C2-Rechner | Projekt-Modi</title>
    <style>
        :root { --tml-red: #e30613; --tml-blue: #003366; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 30px; max-width: 600px; width: 100%; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); border-top: 6px solid var(--tml-red); }
        h2 { color: var(--tml-blue); text-align: center; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; font-size: 0.9em; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: var(--tml-red); color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.2s; }
        button:hover { background: #b3050f; }
        .result-area { margin-top: 25px; display: none; }
        .info-pill { background: #eef2f7; padding: 12px; border-radius: 4px; border-left: 4px solid var(--tml-blue); margin-bottom: 15px; font-size: 0.85em; line-height: 1.4; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--tml-blue); color: white; padding: 10px; text-align: left; font-size: 0.75em; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9em; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .ok { color: #28a745; font-weight: bold; }
        .placeholder { color: #666; font-style: italic; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>TML Projekt-Auslegung</h2>
    
    <div class="input-group">
        <label>Projekt-Typ:</label>
        <select id="projectMode" onchange="updateUI()">
            <option value="neu">1. Berechnung Neuanlage</option>
            <option value="retrofit">2. Retrofit Einbau</option>
            <option value="magnet">3. Retrofit Magnetgehäuse</option>
        </select>
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <div id="calculatorfields">
        <div class="input-group">
            <label>Nennspannung U_n (V):</label>
            <input type="number" id="un" value="20000">
        </div>

        <!-- Feld für Punkt 1: Neuanlage (C1 Kapazität) -->
        <div id="c1-group" class="input-group">
            <label>Konkrete C1 Kapazität (pF):</label>
            <input type="number" id="c1_val" value="27">
        </div>

        <!-- Feld für Punkt 2: Retrofit (Kurzschlussstrom) -->
        <div id="isc-group" class="input-group" style="display:none;">
            <label>Kurzschlussstrom I_sc (&micro;A):</label>
            <input type="number" id="isc_val" value="40">
        </div>

        <div class="input-group">
            <label>Leitungslänge C2 (Meter):</label>
            <input type="number" id="len" value="3">
        </div>

        <button onclick="calculate()">Berechnung starten</button>
    </div>

    <!-- Platzhalter für Punkt 3 -->
    <div id="magnet-placeholder" style="display:none;" class="placeholder">
        Die Berechnungen für das Magnetgehäuse werden zu einem späteren Zeitpunkt hinzugefügt.
    </div>

    <div id="resArea" class="result-area">
        <div id="summary" class="info-pill"></div>
        <div id="table_container"></div>
    </div>
</div>

<script>
function updateUI() {
    const mode = document.getElementById('projectMode').value;
    const calcFields = document.getElementById('calculatorfields');
    const c1Group = document.getElementById('c1-group');
    const iscGroup = document.getElementById('isc-group');
    const magnetPlaceholder = document.getElementById('magnet-placeholder');
    const resArea = document.getElementById('resArea');

    // Reset Results
    resArea.style.display = 'none';

    if (mode === 'magnet') {
        calcFields.style.display = 'none';
        magnetPlaceholder.style.display = 'block';
    } else {
        calcFields.style.display = 'block';
        magnetPlaceholder.style.display = 'none';
        
        if (mode === 'neu') {
            c1Group.style.display = 'block';
            iscGroup.style.display = 'none';
        } else {
            c1Group.style.display = 'none';
            iscGroup.style.display = 'block';
        }
    }
}

function calculate() {
    const Un = parseFloat(document.getElementById('un').value);
    const L = parseFloat(document.getElementById('len').value) || 0;
    const mode = document.getElementById('projectMode').value;
    
    const RM = 2e6; 
    const CL = 300e-12; // Wega Display
    const C_line = L * 100e-12; // Kabel
    const Ule = Un / Math.sqrt(3);

    let C1;
    if (mode === 'neu') {
        C1 = parseFloat(document.getElementById('c1_val').value) * 1e-12;
    } else if (mode === 'retrofit') {
        let isc = parseFloat(document.getElementById('isc_val').value) * 1e-6;
        C1 = isc / (2 * Math.PI * 50 * Ule);
    }

    const E12 = [1.0, 1.2, 1.5, 1.8, 2.2, 2.7, 3.3, 3.9, 4.7, 5.6, 6.8, 8.2];
    let results = [];

    for (let exp = -11; exp <= -7; exp++) {
        for (let base of E12) {
            let C2 = base * Math.pow(10, exp);
            let k = C1 / (C1 + C2 + CL + C_line);
            
            // C2-Prüfung OHNE Wurzel 3 (direkt auf Un)
            let i45 = (0.45 * Un * k) / RM;
            let i10 = (0.10 * Un * k) / RM;

            if (i45 > 2.5e-6 && i10 < 1.67e-6) {
                results.push({
                    c2: format(C2),
                    ih: (i45 * 1e6).toFixed(2),
                    il: (i10 * 1e6).toFixed(2)
                });
            }
        }
    }

    document.getElementById('resArea').style.display = 'block';
    document.getElementById('summary').innerHTML = `
        <strong>Ergebnis:</strong><br>
        Ermitteltes C1: <b>${(C1*1e12).toFixed(1)} pF</b><br>
        Lastkapazität (Display + Kabel): <b>${((CL+C_line)*1e12).toFixed(0)} pF</b>
    `;
    
    let html = `<table><tr><th>C2 (E12)</th><th>I @45% Un (&gt;2.5&micro;A)</th><th>I @10% Un (&lt;1.67&micro;A)</th></tr>`;
    if (results.length > 0) {
        results.forEach(r => {
            html += `<tr><td><b>${r.c2}</b></td><td class="ok">${r.ih} &micro;A</td><td class="ok">${r.il} &micro;A</td></tr>`;
        });
    } else {
        html += `<tr><td colspan="3" style="text-align:center; color:red;">Keine passenden Werte gefunden.</td></tr>`;
    }
    document.getElementById('table_container').innerHTML = html + "</table>";
}

function format(v) {
    if (v >= 1e-6) return (v*1e6).toFixed(1) + " &micro;F";
    if (v >= 1e-9) return (v*1e9).toFixed(1) + " nF";
    return (v*1e12).toFixed(0) + " pF";
}
</script>
</body>
</html>
