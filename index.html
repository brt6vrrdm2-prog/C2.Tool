<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>C2 Tool</title>
    <style>
        :root { --tml-red: #e30613; --tml-blue: #003366; --bg: #f4f7f9; --gray: #6c757d; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; color: #333; }
        .container { background: white; padding: 35px; max-width: 600px; width: 100%; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-top: 8px solid var(--tml-red); position: relative; }
        h1 { color: var(--tml-blue); text-align: center; margin-top: 0; margin-bottom: 30px; font-size: 28px; letter-spacing: -0.5px; }
        .input-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .input-group { flex: 1; margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #555; font-size: 0.9em; }
        input, select { width: 100%; padding: 12px 15px; border: 1.5px solid #dee2e6; border-radius: 6px; box-sizing: border-box; font-size: 16px; transition: border-color 0.2s; }
        input:focus, select:focus { border-color: var(--tml-blue); outline: none; }
        .button-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        button { flex: 2; padding: 16px; background: var(--tml-red); color: white; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 17px; transition: 0.2s; }
        button.secondary { flex: 1; background: var(--gray); min-width: 120px; }
        button.copy-btn { flex: 1; background: var(--tml-blue); font-size: 14px; padding: 10px; }
        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }
        .result-area { margin-top: 30px; border-top: 2px solid #f0f0f0; padding-top: 25px; display: none; }
        .recommendation-box { background: #fff9db; border: 1px solid #ffec99; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .rec-label { font-size: 0.85em; text-transform: uppercase; letter-spacing: 1px; color: #856404; font-weight: bold; }
        .rec-value { color: var(--tml-red); font-size: 32px; font-weight: 800; display: block; margin: 5px 0; }
        .info-pill { background: #f8f9fa; padding: 15px; border-radius: 6px; border-left: 4px solid var(--tml-blue); margin-bottom: 20px; font-size: 0.9em; line-height: 1.6; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th { background: #f1f3f5; color: var(--tml-blue); padding: 12px 10px; text-align: left; font-size: 0.75em; text-transform: uppercase; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px 10px; border-bottom: 1px solid #eee; font-size: 0.9em; }
        .ok { color: #2b8a3e; font-weight: bold; }
        .copy-toast { position: fixed; bottom: 20px; background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; display: none; z-index: 100; }
    </style>
</head>
<body onload="clearAllFields()">

<div class="container">
    <h1>C2 Tool</h1>
    
    <div class="input-group">
        <label>Modus wählen:</label>
        <select id="projectMode" onchange="clearAllFields()">
            <option value="neu">1. Neuanlage</option>
            <option value="retrofit">2. Retrofit</option>
            <option value="magnet">3. Magnetgehäuse</option>
        </select>
    </div>

    <div id="input-fields">
        <div class="input-row">
            <div class="input-group">
                <label>U_n Min (V):</label>
                <input type="number" id="un_min" placeholder="z.B. 10000">
            </div>
            <div class="input-group">
                <label>U_n Max (V):</label>
                <input type="number" id="un_max" placeholder="z.B. 24000">
            </div>
        </div>

        <div id="c1-group" class="input-group">
            <label>C1 Kapazität (pF):</label>
            <input type="number" id="c1_val">
        </div>

        <div id="isc-group" class="input-group" style="display:none;">
            <label>Kurzschlussstrom I_k (&micro;A):</label>
            <input type="number" id="isc_val">
        </div>

        <div id="magnet-group" style="display:none;">
            <div class="input-group">
                <label>Messwert I_HR Orion (&micro;A):</label>
                <input type="number" id="ihr_val">
            </div>
        </div>

        <div class="input-group">
            <label>Leitungslänge zum Wega (m):</label>
            <input type="number" id="len" value="0">
        </div>

        <div class="button-group">
            <button onclick="calculate()">Berechnen</button>
            <button class="secondary" onclick="clearAllFields()">Löschen</button>
            <button class="secondary copy-btn" onclick="copyInputs()">Eingaben kopieren</button>
        </div>
    </div>

    <div id="resArea" class="result-area">
        <div class="button-group" style="justify-content: flex-end; margin-bottom: 10px;">
            <button class="secondary copy-btn" onclick="copyResults()">Ergebnisse kopieren</button>
        </div>
        <div id="recommendation" class="recommendation-box"></div>
        <div id="summary" class="info-pill"></div>
        <div id="table_container"></div>
    </div>
</div>

<div id="toast" class="copy-toast">In Zwischenablage kopiert!</div>

<script>
let lastResults = [];
let currentMode = 'neu';

function clearAllFields() {
    currentMode = document.getElementById('projectMode').value;
    const inputs = document.querySelectorAll('input[type="number"]');
    inputs.forEach(input => {
        if(input.id === 'len') input.value = 0;
        else input.value = '';
    });
    document.getElementById('resArea').style.display = 'none';
    
    document.getElementById('c1-group').style.display = (currentMode === 'neu') ? 'block' : 'none';
    document.getElementById('isc-group').style.display = (currentMode === 'retrofit' || currentMode === 'magnet') ? 'block' : 'none';
    document.getElementById('magnet-group').style.display = (currentMode === 'magnet') ? 'block' : 'none';
}

function copyInputs() {
    const modeText = document.getElementById('projectMode').options[document.getElementById('projectMode').selectedIndex].text;
    const unMin = document.getElementById('un_min').value || '0';
    const unMax = document.getElementById('un_max').value || '0';
    const c1 = document.getElementById('c1_val').value || '-';
    const ik = document.getElementById('isc_val').value || '-';
    const ihr = document.getElementById('ihr_val').value || '-';
    const len = document.getElementById('len').value || '0';

    let text = `C2 TOOL - EINGABEDATEN\n------------------------\n`;
    text += `Modus: ${modeText}\nSpannung: ${unMin}V - ${unMax}V\n`;
    if(currentMode === 'neu') text += `C1 Kapazität: ${c1} pF\n`;
    if(currentMode === 'retrofit' || currentMode === 'magnet') text += `Kurzschlussstrom Ik: ${ik} µA\n`;
    if(currentMode === 'magnet') text += `Messwert I_HR: ${ihr} µA\n`;
    text += `Leitungslänge: ${len} m\n`;

    navigator.clipboard.writeText(text);
    showToast();
}

function copyResults() {
    const summary = document.getElementById('summary').innerText;
    const recLabel = document.querySelector('.rec-label').innerText;
    const recVal = document.querySelector('.rec-value').innerText;
    
    let text = `C2 TOOL - ERGEBNISSE\n------------------------\n${summary}\n\n${recLabel}: ${recVal}\n\n`;
    text += currentMode === 'magnet' ? `TABELLE (C2 Soll | Zusatz | I@45% | I@10%)\n` : `TABELLE (C2 Soll | I@45% | I@10%)\n`;
    
    lastResults.forEach(r => {
        text += currentMode === 'magnet' 
            ? `${format(r.total)} | ${format(r.add)} | ${r.iMin.toFixed(2)}µA | ${r.iMax.toFixed(2)}µA\n`
            : `${format(r.total)} | ${r.iMin.toFixed(2)}µA | ${r.iMax.toFixed(2)}µA\n`;
    });

    navigator.clipboard.writeText(text);
    showToast();
}

function showToast() {
    const t = document.getElementById('toast');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
}

function calculate() {
    let UnMin = parseFloat(document.getElementById('un_min').value) || 0;
    let UnMax = parseFloat(document.getElementById('un_max').value) || 0;
    const L = parseFloat(document.getElementById('len').value) || 0;
    const omega = 2 * Math.PI * 50;
    const RM_WEGA = 2e6;  
    const RM_ORION = 36e6; 
    const CL = 300e-12;   
    const C_line = L * 100e-12; 

    if (UnMin === 0 && UnMax === 0) { alert("Spannung fehlt."); return; }
    if (UnMin === 0) UnMin = UnMax;
    if (UnMax === 0) UnMax = UnMin;

    let C1, C2_HR = 0;
    if (currentMode === 'neu') {
        C1 = parseFloat(document.getElementById('c1_val').value) * 1e-12;
    } else {
        const Ik = parseFloat(document.getElementById('isc_val').value) * 1e-6;
        if (!Ik) { alert("I_k fehlt."); return; }
        C1 = Ik / (omega * (UnMin / Math.sqrt(3)));
        if (currentMode === 'magnet') {
            const Ihr = parseFloat(document.getElementById('ihr_val').value) * 1e-6;
            if (!Ihr) { alert("I_HR fehlt."); return; }
            const Uhr_calc = Ihr * RM_ORION;
            const Ic2 = Math.sqrt(Math.max(0, Math.pow(Ik, 2) - Math.pow(Ihr, 2)));
            C2_HR = Ic2 / (omega * Uhr_calc);
        }
    }
    if (!C1) return;

    const E12 = [1.0, 1.2, 1.5, 1.8, 2.2, 2.7, 3.3, 3.9, 4.7, 5.6, 6.8, 8.2];
    lastResults = [];

    for (let exp = -11; exp <= -7; exp++) {
        for (let base of E12) {
            let C2_total = base * Math.pow(10, exp);
            let k = C1 / (C1 + C2_total + CL + C_line);
            let i45_min = (0.45 * UnMin * k) / RM_WEGA;
            let i10_max = (0.10 * UnMax * k) / RM_WEGA;
            if (i45_min > 2.5e-6 && i10_max < 1.67e-6) {
                lastResults.push({ total: C2_total, add: C2_total - C2_HR, iMin: i45_min * 1e6, iMax: i10_max * 1e6 });
            }
        }
    }

    if (lastResults.length === 0) { alert("Keine passende Kapazität gefunden."); return; }

    let recommended = lastResults.reduce((prev, curr) => Math.abs(curr.iMin - 4.0) < Math.abs(prev.iMin - 4.0) ? curr : prev);
    document.getElementById('resArea').style.display = 'block';
    
    let recHTML = `<span class="rec-label">Empfohlener C2 Wert</span><span class="rec-value">${format(recommended.total)}</span>`;
    if (currentMode === 'magnet') recHTML += `<small>Zusatz-Kondensator: <b>${format(recommended.add)}</b></small>`;
    document.getElementById('recommendation').innerHTML = recHTML;

    document.getElementById('summary').innerHTML = `Ermitteltes C1: <b>${(C1*1e12).toFixed(1)} pF</b> | Bereich: <b>${UnMin}V - ${UnMax}V</b>`;
    
    let html = `<table><tr><th>C2 Soll</th>`;
    if (currentMode === 'magnet') html += `<th>Zusatz</th>`;
    html += `<th>I@45%</th><th>I@10%</th></tr>`;
    
    lastResults.forEach(r => {
        let isRec = (r.total === recommended.total) ? 'style="background:#fff9db"' : '';
        html += `<tr ${isRec}><td>${format(r.total)}</td>`;
        if (currentMode === 'magnet') html += `<td>${format(r.add)}</td>`;
        html += `<td class="ok">${r.iMin.toFixed(2)}µA</td><td>${r.iMax.toFixed(2)}µA</td></tr>`;
    });
    document.getElementById('table_container').innerHTML = html + "</table>";
}

function format(v) {
    if (v <= 1e-13) return "0 pF";
    if (v >= 1e-6) return (v*1e6).toFixed(1) + " µF";
    if (v >= 1e-9) return (v*1e9).toFixed(1) + " nF";
    return (v*1e12).toFixed(0) + " pF";
}
</script>
</body>
</html>
