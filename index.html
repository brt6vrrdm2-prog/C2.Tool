<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>TML Hybrid-Rechner | C1 vs C2 Logik</title>
    <style>
        :root { --tml-red: #e30613; --tml-blue: #003366; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 30px; max-width: 650px; width: 100%; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border-top: 6px solid var(--tml-red); }
        h2 { color: var(--tml-blue); text-align: center; margin-bottom: 20px; }
        .info-box { background: #eef2f7; padding: 15px; border-left: 4px solid var(--tml-blue); margin-bottom: 20px; font-size: 0.85em; line-height: 1.5; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1em; }
        button { width: 100%; padding: 15px; background: var(--tml-red); color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 1.1em; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: var(--tml-blue); color: white; padding: 12px; text-align: left; font-size: 0.8em; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.95em; }
        .highlight { font-weight: bold; color: var(--tml-red); }
    </style>
</head>
<body>

<div class="container">
    <h2>Hybrid-Analyse C1/C2</h2>
    
    <div class="info-box">
        <strong>Berechnungs-Modus:</strong><br>
        • <strong>C1-Ermittlung:</strong> Berücksichtigt &radic;3 (Phasenspannung U/&radic;3).<br>
        • <strong>C2-Prüfung:</strong> Ignoriert &radic;3 (Grenzwerte 10%/45% direkt auf U_n).<br>
        • <strong>Last:</strong> Wega (300pF) + Kabel (100pF/m) + RM (2M&Omega;).
    </div>

    <div class="input-group">
        <label>Nennspannung U_n (V):</label>
        <input type="number" id="un" value="20000">
    </div>

    <div class="input-group">
        <label>Eingabetyp für Koppler:</label>
        <select id="mode">
            <option value="c1">Kapazität C1 (pF)</option>
            <option value="isc">Kurzschlussstrom I_sc (&micro;A)</option>
        </select>
    </div>

    <div class="input-group">
        <label>Wert (pF oder &micro;A):</label>
        <input type="number" id="val" value="15">
    </div>

    <div class="input-group">
        <label>Leitungslänge (m):</label>
        <input type="number" id="len" value="3">
    </div>

    <button onclick="calculateHybrid()">Berechnung starten</button>

    <div id="results" style="display:none; margin-top:25px;">
        <div id="summary" class="info-box" style="background:#f9f9f9;"></div>
        <div id="table_container"></div>
    </div>
</div>

<script>
function calculateHybrid() {
    const Un = parseFloat(document.getElementById('un').value);
    const L = parseFloat(document.getElementById('len').value) || 0;
    const mode = document.getElementById('mode').value;
    const inputVal = parseFloat(document.getElementById('val').value);
    
    const RM = 2000000;
    const CL_Total = (300 + (L * 100)) * 1e-12; // Wega + Kabel
    
    // 1. C1 BERECHNUNG (mit Wurzel 3)
    let C1;
    if (mode === 'isc') {
        // I_sc = (Un / sqrt(3)) * 2 * PI * f * C1
        const U_Phasenspannung = Un / Math.sqrt(3);
        C1 = (inputVal * 1e-6) / (U_Phasenspannung * 2 * Math.PI * 50);
    } else {
        C1 = inputVal * 1e-12;
    }

    // 2. C2 PRÜFUNG (ohne Wurzel 3 - Grenzwerte direkt auf Un bezogen)
    const E12 = [1.0, 1.2, 1.5, 1.8, 2.2, 2.7, 3.3, 3.9, 4.7, 5.6, 6.8, 8.2];
    let found = [];

    for (let d = -11; d <= -7; d++) {
        for (let base of E12) {
            let C2 = base * Math.pow(10, d);
            let k = C1 / (C1 + C2 + CL_Total);
            
            // Hier wird Wurzel 3 ignoriert (Direkt Un * Faktor)
            let i_high = (0.45 * Un * k) / RM;
            let i_low = (0.10 * Un * k) / RM;

            if (i_high > 2.5e-6 && i_low <= 1.67e-6) {
                found.push({
                    c2Str: formatF(C2),
                    ih: (i_high * 1e6).toFixed(2),
                    il: (i_low * 1e6).toFixed(2)
                });
            }
        }
    }

    document.getElementById('results').style.display = 'block';
    document.getElementById('summary').innerHTML = `
        Ermitteltes C1: <strong>${(C1 * 1e12).toFixed(1)} pF</strong><br>
        Gesamte Lastkapazität: <strong>${(CL_Total * 1e12).toFixed(0)} pF</strong>
    `;

    let html = `<table><tr><th>C2 (E12)</th><th>I @45% Un (&gt;2.5&micro;A)</th><th>I @10% Un (&le;1.67&micro;A)</th></tr>`;
    found.forEach(f => {
        html += `<tr><td><strong>${f.c2Str}</strong></td><td>${f.ih} &micro;A</td><td>${f.il} &micro;A</td></tr>`;
    });
    document.getElementById('table_container').innerHTML = html + "</table>";
}

function formatF(val) {
    if (val >= 1e-6) return (val * 1e6).toFixed(1) + " &micro;F";
    if (val >= 1e-9) return (val * 1e9).toFixed(1) + " nF";
    return (val * 1e12).toFixed(0) + " pF";
}
</script>

</body>
</html>
